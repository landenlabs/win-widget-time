name: Build and Package

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Publish
      run: dotnet publish WinWidgetTime.csproj -c Release --self-contained false -o publish

    - name: Zip artifacts
      run: Compress-Archive -Path publish\* -DestinationPath WinWidgetTime.zip

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: WinWidgetTime
        path: WinWidgetTime.zip
        retention-days: 30

    - name: Create GitHub Release and attach zip
      uses: softprops/action-gh-release@v2
      with:
        files: WinWidgetTime.zip
